name: Daily Scrape & Analyze

on:
  schedule:
    - cron: '30 12 * * 1-5'  # 平日 21:30 JST (UTC+9)
  workflow_dispatch:           # 手動実行も可能

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape submissions
        env:
          ATCODER_SESSION: ${{ secrets.ATCODER_SESSION }}
        run: python scripts/scrape_submissions.py

      - name: Analyze
        run: python scripts/analyze.py

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update data $(date -u +%Y-%m-%d)"
          git push
